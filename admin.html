<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="config.js"></script>
    <title>nullpo news - 管理者ダッシュボード</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f9; color: #333; margin: 0; padding: 20px; }
        .admin-container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #cc0000; font-size: 24px; border-bottom: 2px solid #cc0000; padding-bottom: 10px; margin-bottom: 20px; }
        .refresh-btn { background: #555; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .refresh-btn:hover { background: #333; }
        
        /* 申請リストのテーブルスタイル */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        th { background: #f8f9fa; font-weight: bold; color: #555; }
        tr:hover { background: #f9f9f9; }
        
        .approve-btn { background: #00cc66; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .approve-btn:hover { background: #00994c; }
        .no-data { text-align: center; color: #999; padding: 30px; font-style: italic; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>nullpo news 管理者用ダッシュボード 🛠️</h1>
    <p>新規ユーザーの参加申請の確認・承認が行えます。</p>
    
    <button class="refresh-btn" onclick="fetchPendingUsers()">🔄 申請一覧を更新する</button>

    <table>
        <thead>
            <tr>
                <th>希望ユーザーID</th>
                <th>メールアドレス</th>
                <th>申請メッセージ・自己紹介</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="pending-list">
            </tbody>
    </table>
</div>

<script>
    // 画面が開いたときに自動で申請リストを読み込む
    window.onload = function() {
        fetchPendingUsers();
    };

    // 承認待ちユーザー一覧を取得する処理
    async function fetchPendingUsers() {
        const tbody = document.getElementById("pending-list");
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#666;">読み込み中...</td></tr>';

        try {
            const response = await fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: JSON.stringify({ action: "getPending" })
            });

            const pendingUsers = await response.json();
            tbody.innerHTML = ""; // クリア

            if (!pendingUsers || pendingUsers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="no-data">現在、承認待ちの申請はありません。</td></tr>';
                return;
            }

            pendingUsers.forEach(user => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td style="font-weight:bold;">${user.userId}</td>
                    <td>${user.email || '<span style="color:#ccc;">未入力</span>'}</td>
                    <td>${user.comment || '<span style="color:#ccc;">なし</span>'}</td>
                    <td>
                        <button class="approve-btn" onclick="processUser('${user.userId}')">承認する</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">データの取得に失敗しました。GASの設定を確認してください。</td></tr>';
            console.error(error);
        }
    }

    // ユーザーを承認する処理
    async function processUser(userId) {
        if (!confirm(`${userId} の参加申請を承認しますか？`)) return;

        try {
            const response = await fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: JSON.stringify({
                    action: "approve",
                    userId: userId
                })
            });

            const result = await response.json();
            alert(result.message);
            
            // リストを再読み込み
            fetchPendingUsers();

        } catch (error) {
            alert("承認処理中にエラーが発生しました。");
            console.error(error);
        }
    }
</script>
</body>
</html>
