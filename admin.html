<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="config.js"></script>
    <title>nullpo news 管理者用ダッシュボード 🛠️</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #eef2f5; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 30px auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); }
        h1 { color: #cc0000; font-size: 24px; border-bottom: 2px solid #cc0000; padding-bottom: 10px; margin-top: 0; }
        .btn { background: #555; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-approve { background: #0088cc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>管理者用ダッシュボード</h1>
    <table>
        <thead><tr><th>ユーザーID</th><th>メール</th><th>コメント</th><th>操作</th></tr></thead>
        <tbody id="user-list-body">
            <tr><td colspan="4">読み込み中...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // ユーザー一覧取得
    async function loadPendingUsers() {
        const tbody = document.getElementById("user-list-body");
        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "getPending" })
            });
            const result = await res.json();
            renderPendingUsers(result.users);
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="4">通信エラーが発生しました。</td></tr>';
        }
    }

    // 承認処理
    async function approveUser(userId) {
        if (!confirm(`${userId} を承認しますか？`)) return;

        const res = await fetch(GAS_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "approve", userId: userId })
        });
        const result = await res.json();
        alert(result.message);
        loadPendingUsers();
    }

    function renderPendingUsers(users) {
        const tbody = document.getElementById("user-list-body");
        tbody.innerHTML = users.map(u => `
            <tr>
                <td><b>${u.userId}</b></td>
                <td>${u.email || '---'}</td>
                <td>${u.comment || '---'}</td>
                <td><button class="btn btn-approve" onclick="approveUser('${u.userId}')">承認する</button></td>
            </tr>
        `).join('');
    }

    window.onload = loadPendingUsers;
</script>
</body>
</html>
