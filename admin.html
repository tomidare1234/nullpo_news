<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="config.js"></script>
    <title>nullpo news 管理者用ダッシュボード 🛠️</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #eef2f5; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 30px auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); }
        h1 { color: #cc0000; font-size: 24px; border-bottom: 2px solid #cc0000; padding-bottom: 10px; margin-top: 0; }
        .btn { background: #555; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-approve { background: #0088cc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>管理者用ダッシュボード</h1>
    <table>
        <thead><tr><th>ユーザーID</th><th>メール</th><th>コメント</th><th>操作</th></tr></thead>
        <tbody id="user-list-body">
            <tr><td colspan="4">読み込み中...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // HTMLエスケープ（XSS対策）
    function escapeHtml(str) {
        if (str === undefined || str === null) return "";
        return String(str)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function getAuth() {
        const userId = localStorage.getItem("loginUser");
        const token = localStorage.getItem("loginToken");
        if (!userId || !token) return null;
        return { userId, token };
    }

    // 管理者チェック（簡易版：特定のuserIdのみ許可）。※フロント側のみのチェックであり、
    // サーバー側でも別途トークン検証を行っているが、userId自体の権限チェックはしていない。
    function requireAdmin() {
        const auth = getAuth();
        if (!auth || auth.userId !== "admin") {
            alert("管理者権限がありません。");
            location.href = "top.html";
            return null;
        }
        return auth;
    }

    let currentAuth = null;

    async function loadPendingUsers() {
        const tbody = document.getElementById("user-list-body");
        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getPending", userId: currentAuth.userId, token: currentAuth.token })
            });
            const result = await res.json();
            if (!result.success) {
                tbody.innerHTML = '<tr><td colspan="4">' + escapeHtml(result.message || "取得に失敗しました。") + '</td></tr>';
                return;
            }
            renderPendingUsers(result.users);
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="4">通信エラーが発生しました。</td></tr>';
        }
    }

    async function approveUser(userId) {
        if (!confirm(`${userId} を承認しますか？`)) return;

        const res = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ action: "approve", userId: currentAuth.userId, token: currentAuth.token, targetUserId: userId })
        });
        const result = await res.json();
        alert(result.message);
        loadPendingUsers();
    }

    function renderPendingUsers(users) {
        const tbody = document.getElementById("user-list-body");
        if (!users.length) {
            tbody.innerHTML = '<tr><td colspan="4">承認待ちのユーザーはいません。</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(u => `
            <tr>
                <td><b>${escapeHtml(u.userId)}</b></td>
                <td>${escapeHtml(u.email || '---')}</td>
                <td>${escapeHtml(u.comment || '---')}</td>
                <td><button class="btn btn-approve" onclick="approveUser('${escapeHtml(u.userId)}')">承認する</button></td>
            </tr>
        `).join('');
    }

    window.onload = () => {
        currentAuth = requireAdmin();
        if (currentAuth) loadPendingUsers();
    };
</script>
</body>
</html>
