<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="config.js"></script>
    <title>nullpo news - ログイン・参加申請</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #eef2f5; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #0066cc; margin-bottom: 5px; font-size: 28px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }
        .tab-group { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 25px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; color: #666; font-weight: bold; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab.active { color: #0066cc; border-bottom: 2px solid #0066cc; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { resize: vertical; height: 80px; }
        .submit-btn { width: 100%; background: #0066cc; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .submit-btn:hover { background: #0052a3; }
        .toggle-form { display: none; }
        .toggle-form.active { display: block; }
        footer { margin-top: 30px; font-size: 11px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h1>nullpo news</h1>
    <div class="subtitle">架空世界ポータルサイト</div>

    <div class="tab-group">
        <div id="tab-login" class="tab active" onclick="switchTab('login')">ログイン</div>
        <div id="tab-register" class="tab" onclick="switchTab('register')">参加申請</div>
    </div>

    <div id="form-login" class="toggle-form active">
        <div class="form-group">
            <label>ユーザーID</label>
            <input type="text" id="login-id" placeholder="例: tomidare1234">
        </div>
        <div class="form-group">
            <label>パスワード</label>
            <input type="password" id="login-pass" placeholder="••••••••">
        </div>
        <button class="submit-btn" onclick="alert('ログイン機能は、まず申請テストが成功してから動かします！')">ログイン</button>
    </div>

    <div id="form-register" class="toggle-form">
        <div class="form-group">
            <label>希望ユーザーID (必須)</label>
            <input type="text" id="reg-id" placeholder="半角英数字">
        </div>
        <div class="form-group">
            <label>パスワード (必須)</label>
            <input type="password" id="reg-pass" placeholder="••••••••">
        </div>
        <div class="form-group">
            <label>メールアドレス (任意)</label>
            <input type="email" id="reg-email" placeholder="example@nullpo.com">
        </div>
        <div class="form-group">
            <label>申請コメント・自己紹介 (任意)</label>
            <textarea id="reg-comment" placeholder="管理者に届くメッセージ"></textarea>
        </div>
        <button class="submit-btn" onclick="handleRegister()">参加申請を送る</button>
    </div>

    <footer>
        ©nullpo tomidare1234
    </footer>
</div>

<script>
    function switchTab(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.toggle-form').forEach(f => f.classList.remove('active'));
        document.getElementById(`tab-${type}`).classList.add('active');
        document.getElementById(`form-${type}`).classList.add('active');
    }

    // 参加申請の送信処理
    async function handleRegister() {
        const userId = document.getElementById("reg-id").value.trim();
        const password = document.getElementById("reg-pass").value;
        const email = document.getElementById("reg-email").value.trim();
        const comment = document.getElementById("reg-comment").value.trim();

        if (!userId || !password) {
            alert("ユーザーIDとパスワードは必須です。");
            return;
        }

        try {
            // 本番環境（GitHub Pages）から通信を送る標準の形式
            const response = await fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: JSON.stringify({
                    action: "register",
                    userId: userId,
                    password: password,
                    email: email,
                    comment: comment
                })
            });

            const result = await response.json();
            alert(result.message);
            
            if (result.success) {
                switchTab('login');
            }
            
        } catch (error) {
            alert("通信エラーが発生しました。GASのデプロイ設定（全員に公開）をもう一度確認してください。");
            console.error(error);
        }
    }
</script>
</body>
</html>
