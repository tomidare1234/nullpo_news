<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="config.js"></script>
    <title>nullpo news - ログイン・新規申請</title>
    
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #eef2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #0052a3; margin: 0 0 5px 0; font-size: 28px; }
        p  { color: #666; font-size: 14px; margin-bottom: 30px; }
        .tabs { display: flex; border-bottom: 2px solid #eef2f5; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; color: #666; font-weight: bold; font-size: 14px; }
        .tab.active { color: #0052a3; border-bottom: 2px solid #0052a3; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; background: #f6f8fa; }
        .btn { background: #0052a3; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; width: 100%; transition: background 0.2s; margin-bottom: 10px; }
        .btn:hover { background: #004080; }
        .btn:disabled { background: #aab8c2; cursor: not-allowed; }
        .btn-signup { background: #28a745; }
        .btn-signup:hover { background: #218838; }
        .guest-btn { background: #6c757d; }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>nullpo news</h1>
        <p>ぬるぽにゅーす</p>
        
        <div class="tabs">
            <div id="tab-login" class="tab active" onclick="switchTab('login')">ログイン</div>
            <div id="tab-signup" class="tab" onclick="switchTab('signup')">新規参加申請</div>
        </div>

        <form id="form-login" onsubmit="handleLoginSubmit(event)">
            <div class="input-group">
                <label>ユーザーID</label>
                <input type="text" id="login-id" placeholder="ユーザーID" required>
            </div>
            <div class="input-group">
                <label>パスワード</label>
                <input type="password" id="login-pass" placeholder="パスワード" required>
            </div>
            <button type="submit" id="btn-login-submit" class="btn">ログインする</button>
            <button type="button" class="btn guest-btn" onclick="location.href='top.html'">ゲストとして見る</button>
        </form>

        <form id="form-signup" onsubmit="handleSignupSubmit(event)" style="display: none;">
            <div class="input-group">
                <label>希望ユーザーID</label>
                <input type="text" id="sign-id" placeholder="例: kirihara_p" required>
            </div>
            <div class="input-group">
                <label>初期パスワード</label>
                <input type="password" id="sign-pass" placeholder="パスワード" required>
            </div>
            <div class="input-group">
                <label>メールアドレス（任意）</label>
                <input type="text" id="sign-email" placeholder="例: example@mail.com">
            </div>
            <div class="input-group">
                <label>申請コメント（任意）</label>
                <input type="text" id="sign-comment" placeholder="参加希望理由など">
            </div>
            <button type="submit" id="btn-signup-submit" class="btn btn-signup">参加申請を送信する</button>
        </form>
        
        <div style="margin-top: 30px; font-size: 11px; color: #999;">©nullpo tomidare1234</div>
    </div>

<script>
    function switchTab(type) {
        document.getElementById("tab-login").classList.toggle("active", type === 'login');
        document.getElementById("tab-signup").classList.toggle("active", type === 'signup');
        document.getElementById("form-login").style.display = (type === 'login') ? 'block' : 'none';
        document.getElementById("form-signup").style.display = (type === 'signup') ? 'block' : 'none';
    }

    function startLoading(btnId, text) {
        const btn = document.getElementById(btnId);
        btn.disabled = true;
        let count = 0;
        btn.dataset.interval = setInterval(() => {
            count = (count + 1) % 4;
            btn.textContent = text + ".".repeat(count);
        }, 500);
    }

    function stopLoading(btnId, text) {
        const btn = document.getElementById(btnId);
        clearInterval(btn.dataset.interval);
        btn.disabled = false;
        btn.textContent = text;
    }

async function handleLoginSubmit(e) {
    e.preventDefault();
    const uid = document.getElementById("login-id").value;
    const pass = document.getElementById("login-pass").value;

    startLoading("btn-login-submit", "照合中");

    try {

    mode: "cors", // ★これが必要！
    headers: { "Content-Type": "application/json" }, // ★これも必要！
    body: JSON.stringify({ action: "login", userId: uid, password: pass })
});
        // 通信が成功してデータが返ってきたかチェック
        const text = await response.text(); // 一度テキストとして受け取る
        try {
            const result = JSON.parse(text); // JSONに変換してみる
            if (result.success) {
                localStorage.setItem("loginUser", uid);
                window.location.href = "top.html";
            } else {
                alert(result.message || "ログイン失敗");
                stopLoading("btn-login-submit", "ログインする");
            }
        } catch (e) {
            // JSONに変換できなかった場合＝GASがHTMLを返している証拠
            console.error("GASからの返事がHTMLです:", text);
            alert("エラー: サーバーから正しいデータが返ってきませんでした。");
            stopLoading("btn-login-submit", "ログインする");
        }
    } catch (err) {
        console.error(err);
        alert("通信エラーが発生しました");
        stopLoading("btn-login-submit", "ログインする");
    }
}

        }
    }
    
    // ここからがJavaScriptのプログラムだよ！とブラウザに教えてあげる
    async function handleSignupSubmit(e) {
        e.preventDefault();
        startLoading("btn-signup-submit", "送信中");

        const payload = {
            action: "register",
            userId: document.getElementById("sign-id").value,
            password: document.getElementById("sign-pass").value,
            email: document.getElementById("sign-email").value,
            comment: document.getElementById("sign-comment").value
        };

        try {
            const response = await fetch(GAS_URL, {
                method: "POST",
                mode: "cors", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            console.log("GASからの返事:", result);
            alert("メッセージ: " + result.message);
            switchTab('login');
        } catch (err) {
            console.error("通信エラー:", err);
            alert("通信に失敗しました。コンソールを確認してください。");
        } finally {
            stopLoading("btn-signup-submit", "参加申請を送信する");
        }
    }
</script>
</body>
</html>
