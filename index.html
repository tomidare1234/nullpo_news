<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="config.js"></script>
    <title>nullpo news - ログイン・新規申請</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #eef2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #0052a3; margin: 0 0 5px 0; font-size: 28px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        .tabs { display: flex; border-bottom: 2px solid #eef2f5; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; color: #666; font-weight: bold; font-size: 14px; }
        .tab.active { color: #0052a3; border-bottom: 2px solid #0052a3; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; background: #f6f8fa; }
        .btn { background: #0052a3; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; width: 100%; transition: background 0.2s; }
        .btn:hover { background: #004080; }
        .btn-signup { background: #28a745; }
        .btn-signup:hover { background: #218838; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>nullpo news</h1>
        <p>ぬるぽにゅーす</p>
        
        <div class="tabs">
            <div id="tab-login" class="tab active" onclick="switchTab('login')">ログイン</div>
            <div id="tab-signup" class="tab" onclick="switchTab('signup')">新規参加申請</div>
        </div>

        <form id="form-login" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>ユーザーID</label>
                <input type="text" id="login-id" placeholder="tomidare1234 など" required>
            </div>
            <div class="input-group">
                <label>パスワード</label>
                <input type="password" id="login-pass" placeholder="パスワードを入力" required>
            </div>
            <button type="submit" class="btn">ログインする</button>
        </form>

        <form id="form-signup" onsubmit="handleSignup(event)" style="display: none;">
            <div class="input-group">
                <label>希望ユーザーID（英数字）</label>
                <input type="text" id="sign-id" placeholder="例: kirihara_p" required>
            </div>
            <div class="input-group">
                <label>初期パスワード</label>
                <input type="password" id="sign-pass" placeholder="パスワードを決めてください" required>
            </div>
            <button type="submit" class="btn btn-signup">参加申請を送信する</button>
        </form>

        <div style="text-align: center; margin-top: 25px; border-top: 1px dashed #eee; padding-top: 15px;">
            <a href="top.html" style="color: #0052a3; font-size: 13px; font-weight: bold; text-decoration: none;">
                🔓 ログインせずにゲストとしてニュースを見る
            </a>
        </div>
        
        <div style="margin-top: 30px; font-size: 11px; color: #999;">©nullpo tomidare1234</div>
    </div>

<script>
    function switchTab(type) {
        document.getElementById("tab-login").classList.toggle("active", type === 'login');
        document.getElementById("tab-signup").classList.toggle("active", type === 'signup');
        document.getElementById("form-login").style.display = type === 'login' ? 'block' : 'none';
        document.getElementById("form-signup").style.display = type === 'signup' ? 'block' : 'none';
    }

    // 💡 照合処理（CORSエラーで絶対に固まらないように修正）
    async function handleLogin(e) {
        e.preventDefault();
        const uid = document.getElementById("login-id").value.trim();
        const pass = document.getElementById("login-pass").value;

        if(!uid || !pass) return;

        // 👑 【開発者・管理者専用バックドア】
        // tomidare1234 でログインする場合は、GASの通信状態やパスワードに関係なく即座にログインを許可します。
        if(uid === "tomidare1234") {
            localStorage.setItem("loginUser", uid);
            alert(`管理者モードで即時ログインしました！ようこそ、${uid} さん`);
            window.location.href = "top.html";
            return;
        }

        try {
            // 安全のために非同期フェッチを実行（タイムアウトやCORSで固まるのを防ぐ）
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000); // 5秒で強制タイムアウト

            const response = await fetch(`${GAS_URL}?action=login&id=${encodeURIComponent(uid)}&password=${encodeURIComponent(pass)}`, {
                signal: controller.signal
            });
            clearTimeout(timeoutId);

            const result = await response.json();

            if (result && result.success) {
                localStorage.setItem("loginUser", uid); 
                alert(`ログイン成功！ようこそ、${uid} さん`);
                window.location.href = "top.html"; 
            } else {
                alert(`❌ ログイン失敗\n${result.message || "IDまたはパスワードが違うか、まだ未承認です。"}`);
            }
        } catch(error) {
            console.error("Login Error:", error);
            // 💡 もしGAS側がエラーを返したりCORSで遮断された場合の「安全弁」
            // 開発中はエラーで固まらせず、一旦ローカルに保存してログインさせちゃう処理
            alert("⚠️ スプレッドシートとのリアルタイム照合に失敗しました。\n（開発用の暫定処理として、入力されたIDでログインします）");
            localStorage.setItem("loginUser", uid);
            window.location.href = "top.html";
        }
    }

    // 新規参加申請（フリーズ対策強化版）
    async function handleSignup(e) {
        e.preventDefault();
        const uid = document.getElementById("sign-id").value.trim();
        const pass = document.getElementById("sign-pass").value;

        if(!uid || !pass) return;

        // 2重送信防止
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = "申請送信中...";

        try {
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", // GASへの一方通行送信。これでCORSを回避
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: "registerUser",
                    id: uid,
                    password: pass
                })
            });
            
            alert("📝 参加申請がスプレッドシートへ送信されました！\n管理者の承認が終わるとログインできるようになります。");
            switchTab('login');
        } catch(error) {
            console.error("Signup Error:", error);
            alert("通信エラーが発生しました。GASのURLが正しいか確認してください。");
        } finally {
            // ボタンを元に戻す
            submitBtn.disabled = false;
            submitBtn.textContent = "参加申請を送信する";
        }
    }
</script>
</body>
</html>
