<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プロフィール設定 - nullpo news</title>
    <script src="config.js"></script>
    <style>
        body { font-family: sans-serif; background: #eef2f5; padding: 20px; }
        .card { background: white; padding: 25px; margin: 0 auto; max-width: 600px; border-radius: 15px; }
        .input-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; }
        .btn { background: #0052a3; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>プロフィール設定</h2>
    <div class="input-group">
        <label>表示名</label>
        <input type="text" id="edit-name">
    </div>
    <div class="input-group">
        <label>アイコン画像URL</label>
        <input type="text" id="edit-icon">
    </div>
    <div class="input-group">
        <label>企業/自己紹介 (プロフィール文)</label>
        <textarea id="edit-bio" rows="3"></textarea>
    </div>
    
    <button class="btn" onclick="saveSettings()">保存して戻る</button>
</div>

<script>
    window.onload = async () => {
        const uid = localStorage.getItem("loginUser");
        const res = await fetch(GAS_URL + "?action=getSession&user=" + uid);
        const user = await res.json();
        document.getElementById("edit-name").value = user.name;
        document.getElementById("edit-icon").value = user.icon || "";
        document.getElementById("edit-bio").value = user.bio || "";
    };

    async function saveSettings() {
        const uid = localStorage.getItem("loginUser");
        await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "updateUser", 
                user: uid, 
                name: document.getElementById("edit-name").value,
                icon: document.getElementById("edit-icon").value,
                bio: document.getElementById("edit-bio").value
            })
        });
        location.href = "top.html";
    }
</script>
</body>
</html>
